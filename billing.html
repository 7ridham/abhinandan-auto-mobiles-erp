<!DOCTYPE html>
<html>

<head>
<title>Billing</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- Sidebar -->

<div class="sidebar">
<h2>Auto ERP</h2>

<a href="dashboard.html">Dashboard</a>
<a href="billing.html">Billing</a>
<a href="products.html">Products</a>
<a href="customers.html">Customers</a>

</div>

<!-- Main -->

<div class="main">

<h1>Billing</h1>

<!-- Customer Search -->

<div class="card">
<h3>Select Customer</h3>

<input id="customerSearch" placeholder="Search by name or phone">

<ul id="customerList"></ul>

</div>

<!-- Product Search -->

<div class="card">
<h3>Add Products</h3>

<input id="productSearch" placeholder="Search product...">

<ul id="productList"></ul>

</div>

<!-- Bill Table -->

<div class="card">

<h3>Current Bill</h3>

<table>
  
<thead>
<tr>
<th>Item</th>
<th>Qty</th>
<th>Price</th>
<th>Total</th>
<th>Action</th>
</tr>
</thead>



<tbody id="billTable"></tbody>

</table>

<h2>Total: ₹<span id="totalAmount">0</span></h2>

<button id="saveBtn">Save Bill</button>


</div>

</div>

<script type="module">

import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabaseUrl = "https://mhhnmndnolhapaoqtbxo.supabase.co"
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1oaG5tbmRub2xoYXBhb3F0YnhvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4Mzg4NTksImV4cCI6MjA4ODQxNDg1OX0.IMSp8vYiCln_iSuoT_H2qdeX_dP1WMhOOskDw20eJXw"

const supabase = createClient(supabaseUrl, supabaseKey)

let selectedCustomer = null
let billItems = []
let totalAmount = 0


// 🔎 CUSTOMER SEARCH

const customerSearch = document.getElementById("customerSearch")

customerSearch.addEventListener("input", async () => {

const text = customerSearch.value

const { data } = await supabase
.from('customers')
.select('*')
.or(`name.ilike.%${text}%,phone.ilike.%${text}%`)
.limit(5)

const list = document.getElementById("customerList")
list.innerHTML = ""

data.forEach(c => {

const li = document.createElement("li")
li.innerText = c.name + " - " + c.phone

li.onclick = () => {
selectedCustomer = c
customerSearch.value = c.name
list.innerHTML = ""
}

list.appendChild(li)

})

})


// 🔎 PRODUCT SEARCH

const productSearch = document.getElementById("productSearch")

productSearch.addEventListener("input", async () => {

const text = productSearch.value

const { data } = await supabase
.from('inventory')
.select('*')
.ilike('item_name', `%${text}%`)
.limit(5)

const list = document.getElementById("productList")
list.innerHTML = ""

data.forEach(p => {

const li = document.createElement("li")
li.innerText = p.item_name + " (Stock: " + p.quantity + ")"

li.onclick = () => addToBill(p)

list.appendChild(li)

})

})


// ➕ ADD ITEM TO BILL

function addToBill(product){

let item = billItems.find(i => i.id === product.id)

if(item){
item.qty++
} else {
billItems.push({
id: product.id,
name: product.item_name,
price: product.selling_price,
qty: 1
})
}

renderBill()

}


// 🧾 RENDER BILL

function renderBill(){

const table = document.getElementById("billTable")
table.innerHTML = ""

totalAmount = 0

billItems.forEach((item, index) => {

let total = item.qty * item.price
totalAmount += total

table.innerHTML += `
<tr>
<td>${item.name}</td>

<td>
<input type="number" value="${item.qty}" min="1"
onchange="updateQty(${index}, this.value)"
style="width:60px;">
</td>

<td>${item.price}</td>
<td>${total}</td>

<td>
<button onclick="removeItem(${index})">❌</button>
</td>

</tr>
`

})

document.getElementById("totalAmount").innerText = totalAmount

}



// 💾 SAVE BILL
  
async function saveBill(){

try {

if(!selectedCustomer){
alert("Select customer first")
return
}

if(billItems.length === 0){
alert("Add products first")
return
}

// Insert into sales
const { data: sale, error: saleError } = await supabase
.from('sales')
.insert([
{
customer_id: selectedCustomer.id,
total_amount: totalAmount
}
])
.select()
.single()

if(saleError){
console.log(saleError)
alert("Error saving sale ❌")
return
}


// Insert items
for(const item of billItems){

const { error: itemError } = await supabase.from('bill_items').insert([
{
sale_id: sale.id,
item_id: item.id,
quantity: item.qty,
price: item.price,
total: item.qty * item.price
}
])


if(itemError){
console.log("ITEM ERROR:", itemError)
alert(itemError.message)
return
}



// Update inventory
const { data: productData, error: fetchError } = await supabase
.from('inventory')
.select('quantity')
.eq('id', item.id)
.single()

if(fetchError){
console.log(fetchError)
return
}

let newQty = productData.quantity - item.qty

const { error: updateError } = await supabase
.from('inventory')
.update({ quantity: newQty })
.eq('id', item.id)

if(updateError){
console.log(updateError)
return
}

}

alert("Bill Saved ✅")

billItems = []
renderBill()

} catch (error) {
console.log(error)
alert("Error saving bill ❌")
}
}

document.getElementById("saveBtn").addEventListener("click", saveBill)

// ✏️ Update Quantity
  
function updateQty(index, value){

billItems[index].qty = parseInt(value)

renderBill()

}


// ❌ Remove Item
  
function removeItem(index){

billItems.splice(index, 1)

renderBill()

}

  
</script>

</body>
</html>
