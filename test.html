  }

  let table = `
  <table border="1" cellpadding="10">
  <tr>
    <th>ID</th>
    <th>Name</th>
    <th>Phone</th>
    <th>Address</th>
  </tr>
  `

  data.forEach(customer => {
    table += `
    <tr>
      <td>${customer.id}</td>
      <td>${customer.name}</td>
      <td>${customer.phone}</td>
      <td>${customer.address}</td>
    </tr>
    `
  })

  table += "</table>"

  result.innerHTML = table

}
