<!DOCTYPE html>
<html>
<head>

<title>Products - Abhinandan Auto Mobiles ERP</title>

<style>

body{
font-family:Arial;
margin:0;
display:flex;
}

.sidebar{
width:220px;
background:#1f2937;
color:white;
height:100vh;
padding:20px;
}

.sidebar a{
display:block;
color:white;
padding:10px;
text-decoration:none;
margin-bottom:5px;
}

.main{
flex:1;
padding:30px;
}

<input 
id="search"
placeholder="Search product..."
style="padding:10px;width:300px;margin-bottom:20px;"
>

table{
border-collapse:collapse;
width:100%;
}

th,td{
border:1px solid #ddd;
padding:8px;
}

th{
background:#f3f4f6;
}

</style>

</head>

<body>

<div class="sidebar">

<h2>Auto ERP</h2>

<a href="dashboard.html">Dashboard</a>
<a href="#">Billing</a>
<a href="purchase-billing.html">Purchase Billing</a>
<a href="products.html">Products</a>
<a href="#">Customers</a>
<a href="customer-ledger.html">Customer Ledger</a>
</div>

<div class="main">

<h1>Product Inventory</h1>

<input id="search" placeholder="Search product..." style="padding:10px;width:300px">

<br><br>

<table>

<thead>
<tr>
<th>ID</th>
<th>Item Name</th>
<th>Category</th>
<th>Quantity</th>
<th>Purchase Price</th>
<th>Selling Price</th>
<th>Unit</th>
<th>Supplier</th>
<th>Notes</th>
</tr>
</thead>



<tbody id="productTable"></tbody>

</table>

</div>

<script type="module">

import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabaseUrl = "https://mhhnmndnolhapaoqtbxo.supabase.co"
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1oaG5tbmRub2xoYXBhb3F0YnhvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4Mzg4NTksImV4cCI6MjA4ODQxNDg1OX0.IMSp8vYiCln_iSuoT_H2qdeX_dP1WMhOOskDw20eJXw"

const supabase = createClient(supabaseUrl, supabaseKey)

async function loadProducts(){

const { data } = await supabase
.from('inventory')
.select('*')
.limit(100)

const table = document.getElementById("productTable")

table.innerHTML=""

data.forEach(product => {

table.innerHTML += `
<tr>
<td>${product.id}</td>
<td>${product.item_name}</td>
<td>${product.category}</td>
<td>${product.quantity}</td>
<td>${product.purchase_price}</td>
<td>${product.selling_price}</td>
<td>${product.unit_type}</td>
<td>${product.suppliers}</td>
<td>${product.notes}</td>
</tr>
`



})

}

loadProducts()
//live search feature 



const searchInput = document.getElementById("search")

searchInput.addEventListener("input", async function(){

const searchText = searchInput.value

const { data } = await supabase
.from('inventory')
.select('*')
.ilike('item_name', `%${searchText}%`)
.limit(20)

const table = document.getElementById("productTable")

table.innerHTML = ""

data.forEach(product => {

table.innerHTML += `
<tr>
<td>${product.id}</td>
<td>${product.item_name}</td>
<td>${product.category}</td>
<td>${product.quantity}</td>
<td>${product.purchase_price}</td>
<td>${product.selling_price}</td>
<td>${product.unit_type}</td>
<td>${product.suppliers}</td>
<td>${product.notes}</td>
</tr>
`


})

})
</script>
</body>
</html>
