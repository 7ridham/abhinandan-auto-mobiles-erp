<body>

<div class="main">

<h1>Dashboard</h1>

<div class="card">
<h3>Today's Sales</h3>
<p id="todaySales">₹0</p>
</div>

<div class="card">
<h3>Total Products</h3>
<p id="totalProducts">0</p>
</div>

<div class="card">
<h3>Total Customers</h3>
<p id="totalCustomers">0</p>
</div>

</div>

<script type="module">

import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabaseUrl = "https://mhhnmndnolhapaoqtbxo.supabase.co"
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1oaG5tbmRub2xoYXBhb3F0YnhvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4Mzg4NTksImV4cCI6MjA4ODQxNDg1OX0.IMSp8vYiCln_iSuoT_H2qdeX_dP1WMhOOskDw20eJXw"

  const supabase = createClient(supabaseUrl, supabaseKey)


// TOTAL PRODUCTS
async function loadProducts(){
const { count } = await supabase
.from('inventory')
.select('*', { count: 'exact', head: true })

document.getElementById("totalProducts").innerText = count
}


// TOTAL CUSTOMERS
async function loadCustomers(){
const { count } = await supabase
.from('customers')
.select('*', { count: 'exact', head: true })

document.getElementById("totalCustomers").innerText = count
}


// TODAY SALES
async function loadTodaySales(){

const today = new Date().toISOString().split('T')[0]

const { data } = await supabase
.from('sales')
.select('total_amount, created_at')

let total = 0

data.forEach(sale => {
if(sale.created_at.startsWith(today)){
total += sale.total_amount || 0
}
})

document.getElementById("todaySales").innerText = "₹" + total

}


// LOAD ALL
loadProducts()
loadCustomers()
loadTodaySales()

</script>

</body>
